<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:#07131c;}
  svg{display:block;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
</style></head><body>
<svg id="s" width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0e2434" stroke-width="1"/>
    </pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f6f86"/></marker>
  </defs>
  <rect width="1280" height="720" fill="#07131c"/><rect width="1280" height="720" fill="url(#grid)"/>
  <rect x="0" y="0" width="1280" height="3" fill="#22d3ee" opacity="0.5"/>

  <text x="56" y="52" font-size="26" font-weight="700" fill="#67e8f9" filter="url(#glow)">refpool</text>
  <text x="176" y="52" font-size="17" fill="#7fa0b3">@refpool/nestjs — per-tenant pool acquired per request, released when the response ends</text>
  <line x1="56" y1="70" x2="1224" y2="70" stroke="#143349" stroke-width="1"/>

  <!-- module lifecycle strip -->
  <rect x="56" y="92" width="1168" height="52" rx="10" fill="#0a1622" stroke="#1b3644" stroke-width="1.2"/>
  <text x="76" y="124" font-size="13" fill="#7fa0b3">module lifecycle:</text>
  <text id="lcInit" x="230" y="124" font-size="13" fill="#5eead4">onModuleInit → pool.start() + warm()</text>
  <text x="640" y="124" font-size="13" fill="#4b6b7d">·····························</text>
  <text id="lcDown" x="900" y="124" font-size="13" fill="#7fa0b3">onApplicationShutdown → drain()</text>

  <!-- pipeline stages -->
  <g id="stagesG"></g>

  <!-- refpool box -->
  <rect x="360" y="470" width="560" height="96" rx="12" fill="#0a1c24" stroke="#2dd4bf" stroke-width="1.6"/>
  <text x="380" y="500" font-size="14" font-weight="700" fill="#5eead4">RefPoolService · RefCountedLruPool&lt;pg.Pool&gt;</text>
  <text x="380" y="524" font-size="13" fill="#9fb8c6">acquire(tenantId) → shared, refcounted   ·   release() on response finish/close</text>
  <text x="380" y="548" font-size="13" fill="#7fa0b3">refCount <tspan id="rc" fill="#67e8f9" font-weight="700">0</tspan>   ·   live pools bounded by max</text>

  <text x="56" y="632" font-size="14" fill="#9fb8c6">The route body never manages the lifecycle — the middleware attaches <tspan fill="#67e8f9">req.tenantResource</tspan> and registers the release on <tspan fill="#67e8f9">res.on('finish')</tspan>.</text>
  <text x="56" y="660" font-size="14" fill="#9fb8c6">Health: <tspan fill="#5eead4">GET /health/connections</tspan> → live / idle / in-use / breaker state.</text>

  <g id="tokens"></g>
</svg>
<script>
var TOTAL=170;
var STAGES=[
  {x:56,  w:210, t:'HTTP request', s:'header x-tenant-id: acme'},
  {x:296, w:230, t:'TenantConnection­Middleware', s:'acquire(tenantId)'},
  {x:556, w:150, t:'req.tenantResource', s:'= pg.Pool'},
  {x:736, w:180, t:'Controller', s:'pool.query(sql)'},
  {x:946, w:278, t:'Response finish/close', s:'→ release()'}
];
function lerp(a,b,t){return a+(b-a)*t;}
function tok(x,y,c){return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="7" fill="'+c+'" filter="url(#glow)"/>';}

function render(f){
  var p=(f%TOTAL)/TOTAL;
  var active=Math.min(STAGES.length-1, Math.floor(p*STAGES.length*0.98));
  // stage boxes
  var g='', yy=300, hh=92;
  for(var i=0;i<STAGES.length;i++){
    var S=STAGES[i], on=i===active, col = i===4?'#38bdf8':'#2dd4bf';
    g+='<rect x="'+S.x+'" y="'+yy+'" width="'+S.w+'" height="'+hh+'" rx="12" fill="'+(on?'#0c2230':'#0a151c')+'" stroke="'+(on?col:'#1b3644')+'" stroke-width="'+(on?2:1.2)+'"'+(on?' filter="url(#glow)"':'')+'/>';
    g+='<text x="'+(S.x+16)+'" y="'+(yy+38)+'" font-size="13.5" font-weight="700" fill="'+(on?col:'#7fa0b3')+'">'+S.t.replace('­','')+'</text>';
    g+='<text x="'+(S.x+16)+'" y="'+(yy+62)+'" font-size="12.5" fill="'+(on?'#cfe6ef':'#4b6b7d')+'">'+S.s+'</text>';
    if(i<STAGES.length-1) g+='<path d="M'+(S.x+S.w+4)+' '+(yy+hh/2)+' h'+((STAGES[i+1].x)-(S.x+S.w)-8)+'" stroke="#2f6f86" stroke-width="1.6" marker-end="url(#arr)"/>';
  }
  document.getElementById('stagesG').innerHTML=g;

  // refcount: 1 while acquired (stages 1..3), back to 0 after release (stage 4)
  document.getElementById('rc').textContent = (active>=1 && active<=3) ? '1' : '0';

  // moving request token across the pipeline center line
  var tx = lerp(150, 1090, p);
  var col = p<0.82 ? '#67e8f9' : '#4ade80';
  document.getElementById('tokens').innerHTML = tok(tx, 346, col);

  // lifecycle emphasis
  document.getElementById('lcInit').setAttribute('fill', p<0.06?'#5eead4':'#3f7d6f');
  document.getElementById('lcDown').setAttribute('fill', p>0.94?'#f0b866':'#7fa0b3');
}
var m=location.hash.match(/f=(\d+)/);
render(m?parseInt(m[1]):0);
</script>
</body></html>
